<!DOCTYPE html>  <html lang="en">  
<head>  
<meta charset="UTF-8">  
<title>Special Question 💖</title>  
<style>  
body {  
  font-family: Arial, sans-serif;  
  background: #ffe6eb;  
  display: flex;  
  justify-content: center;  
  align-items: center;  
  height: 100vh;  
}  .container {
background: white;
padding: 30px;
border-radius: 20px;
text-align: center;
width: 300px;
}

button {
padding: 12px 20px;
margin: 10px;
border: none;
border-radius: 10px;
font-size: 16px;
}

#yes {
background: #ff4d79;
color: white;
}

#no {
background: lightgray;
position: relative;
}
</style>

</head>  <body>  <div class="container" id="step1">  
  <h2>Enter your name 💌</h2>  
  <input type="text" id="name" placeholder="Your name">  
  <br><br>  
  <button onclick="start()">Continue</button>  
</div>  <div class="container" id="step2" style="display:none;">  
  <h2 id="question"></h2>  
  <button id="yes" onclick="yesClicked()">Yes 💖</button>  
  <button id="no" onmouseover="moveNo()">No 😅</button>  
</div>  <script>  
function start() {  
  let name = document.getElementById("name").value;  
  document.getElementById("step1").style.display = "none";  
  document.getElementById("step2").style.display = "block";  
  document.getElementById("question").innerText =  
    name + ", will you forever be mine?";  
}  
  
function yesClicked() {  
  alert("Yay! 💖 Love you forever!");  
}  
  
function moveNo() {  
  let btn = document.getElementById("no");  
  btn.style.position = "absolute";  
  btn.style.top = Math.random() * 200 + "px";  
  btn.style.left = Math.random() * 200 + "px";  
}  
</script>  </body>  
</html>
